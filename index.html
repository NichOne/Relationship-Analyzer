<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relationship Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
  
  <div id="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span style="font-size: 12px; font-weight: 700;">Menu</span>
        <div style="display: flex; gap: 8px; align-items: center;">
          <button class="theme-toggle" id="theme-toggle" title="Toggle theme">☀</button>
          <div style="position: relative;">
            <button class="theme-toggle" id="notification-btn" title="Notifications">🔔</button>
            <div id="notification-badge" style="position: absolute; top: -4px; right: -4px; width: 16px; height: 16px; background: #ff4444; border-radius: 50%; font-size: 9px; font-weight: 700; display: none; align-items: center; justify-content: center; color: #fff;"></div>
          </div>
        </div>
      </div>
      <nav class="tabs">
        <button class="tab active" data-module="dashboard">Overview</button>
        <button class="tab" data-module="debt">Social Debt</button>
        <button class="tab" data-module="emotional">Emotional Bait</button>
        <button class="tab" data-module="network">Network Power</button>
        <button class="tab" data-module="boundary">Boundaries</button>
        <button class="tab" data-module="status">Status Games</button>
        <button class="tab" data-module="intimacy">Intimacy</button>
        <button class="tab" data-module="credit">Social Credit</button>
        <button class="tab" data-module="compare">Compare</button>
        <button class="tab" data-module="ai">AI Analyzer</button>
        <button class="tab" data-module="about">About</button>
        <button class="tab" data-module="notifications">Notifications</button>
        <button class="tab" data-module="legend">Legend</button>
        <button class="tab" data-module="settings">Settings</button>
      </nav>
    </aside>
    
    <div class="main-content">
      <main id="content"></main>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
